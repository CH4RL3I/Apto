name: apto
region: fra
services:
  - name: web
    github:
      repo: CH4RL3I/Apto
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
